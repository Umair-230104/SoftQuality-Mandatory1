          #SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        #run: |
          #mvn sonar:sonar \
            #-Dsonar.projectKey=masih1903_fakeinfotest \
            #-Dsonar.organization=masih1903 \
            #-Dsonar.host.url=https://sonarcloud.io \
            #-Dsonar.login=$SONAR_TOKEN